name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore FixToJson.sln

      - name: Build
        run: dotnet build FixToJson.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test FixToJson.sln --no-build --configuration Release --verbosity normal
